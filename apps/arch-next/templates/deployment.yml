apiVersion: apps/v1
kind: Deployment
metadata:
  name: arch-next
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: arch-next
  template:
    metadata:
      labels:
        app: arch-next
    spec:
      containers:
        - name: arch-next
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 3000