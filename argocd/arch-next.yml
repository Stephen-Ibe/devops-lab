apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arch-next
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Stephen-Ibe/devops-lab.git
    path: apps/arch-next
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true