apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Stephen-Ibe/devops-lab.git
    path: infrastructure/crossplane
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated: {}